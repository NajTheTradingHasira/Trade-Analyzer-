# Railway deployment config for APEX Trade Analyzer
# Deploy as a cron job service — runs alerts on schedule
#
# SETUP:
#   1. Connect GitHub repo to Railway
#   2. Create TWO services from the same repo:
#      Service 1: "alerts-morning" — cron 30 12 * * 1-5 (8:30 AM ET)
#      Service 2: "alerts-close"   — cron 30 20 * * 1-5 (4:30 PM ET)
#   3. Set env vars on both: SLACK_WEBHOOK_URL
#   4. Each service uses the same Dockerfile

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 2
